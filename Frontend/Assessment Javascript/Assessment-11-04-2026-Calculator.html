<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - Simple Calculator</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f2f4f7;
        }
        .calculator-card {
            max-width: 450px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }
        .result-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="calculator-card">
        <h3 class="text-center mb-2">Index - Simple Calculator</h3>
        <p class="text-center text-muted">Trainer Name: Mohd Salman</p>

        <form id="calcForm">
            <div class="mb-3">
                <label for="num1" class="form-label">First Number</label>
                <input type="number" id="num1" class="form-control" placeholder="Enter first number" required>
            </div>

            <div class="mb-3">
                <label for="num2" class="form-label">Second Number</label>
                <input type="number" id="num2" class="form-control" placeholder="Enter second number" required>
            </div>

            <div class="row g-3 mt-2">
    <div class="col-6">
        <button type="button" class="btn btn-success w-100" onclick="add()">
            Add
        </button>
    </div>
    <div class="col-6">
        <button type="button" class="btn btn-primary w-100" onclick="subtract()">
            Subtract
        </button>
    </div>
    <div class="col-6">
        <button type="button" class="btn btn-warning text-white w-100" onclick="multiply()">
            Multiply
        </button>
    </div>
    <div class="col-6">
        <button type="button" class="btn btn-danger w-100" onclick="divide()">
            Division
        </button>
    </div>
</div>
        </form>

        <div class="result-box" id="result">
            Calculated Result: --
        </div>
    </div>
</div>

<script>
    function getNumbers() {
        const num1 = parseFloat(document.getElementById("num1").value);
        const num2 = parseFloat(document.getElementById("num2").value);

        if (isNaN(num1) || isNaN(num2)) {
            alert("Please enter valid numbers.");
            return null;
        }
        return { num1, num2 };
    }

    function add() {
        const nums = getNumbers();
        if (!nums) return;
        const result = nums.num1 + nums.num2;
        displayResult(nums.num1, nums.num2, "+", result);
    }

    function subtract() {
        const nums = getNumbers();
        if (!nums) return;
        const result = nums.num1 - nums.num2;
        displayResult(nums.num1, nums.num2, "-", result);
    }

    function multiply() {
        const nums = getNumbers();
        if (!nums) return;
        const result = nums.num1 * nums.num2;
        displayResult(nums.num1, nums.num2, "×", result);
    }

    function divide() {
        const nums = getNumbers();
        if (!nums) return;
        if (nums.num2 === 0) {
            alert("Division by zero is not allowed.");
            return;
        }
        const result = nums.num1 / nums.num2;
        displayResult(nums.num1, nums.num2, "÷", result.toFixed(2));
    }

    function displayResult(a, b, operator, result) {
        document.getElementById("result").innerHTML =
            `Calculated Result: ${a} ${operator} ${b} = ${result}`;
    }
</script>

</body>
</html>
